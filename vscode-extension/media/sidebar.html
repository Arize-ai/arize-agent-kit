<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arize Tracing</title>
  <style>
    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      color: var(--vscode-foreground);
      padding: 0;
      margin: 0;
    }
    .header {
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--vscode-sideBarSectionHeader-foreground);
    }
    .status-row {
      display: flex;
      align-items: center;
      padding: 4px 12px;
      cursor: pointer;
      gap: 6px;
    }
    .status-row:hover {
      background: var(--vscode-list-hoverBackground);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.running { background: #3fb950; }
    .dot.stopped { background: #f85149; }
    .backend-row {
      padding: 4px 12px;
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
    }
    .divider {
      padding: 8px 12px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--vscode-sideBarSectionHeader-foreground);
      border-top: 1px solid var(--vscode-sideBarSectionHeader-border);
      margin-top: 4px;
    }
    .harness-card {
      padding: 6px 12px;
      border-bottom: 1px solid var(--vscode-widget-border, transparent);
    }
    .harness-card:hover {
      background: var(--vscode-list-hoverBackground);
    }
    .harness-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .harness-project {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      margin-bottom: 4px;
    }
    .harness-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      background: none;
      border: none;
      color: var(--vscode-textLink-foreground);
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }
    .action-btn:hover {
      color: var(--vscode-textLink-activeForeground);
      text-decoration: underline;
    }
    .add-btn {
      display: block;
      width: calc(100% - 24px);
      margin: 8px 12px;
      padding: 6px 0;
      text-align: center;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
    }
    .add-btn:hover {
      background: var(--vscode-button-hoverBackground);
    }
    .empty-state {
      padding: 16px 12px;
      text-align: center;
      color: var(--vscode-descriptionForeground);
      font-size: 12px;
      line-height: 1.4;
    }
    #harness-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="header">ARIZE TRACING</div>

  <div id="collector-status" class="status-row" title="Click to toggle collector">
    <span class="dot stopped" id="collector-dot"></span>
    <span id="collector-label">Stopped</span>
  </div>

  <div class="backend-row" id="backend-row">Backend: &mdash;</div>

  <div class="divider">Installed</div>

  <div id="harness-list"></div>

  <div id="empty-state" class="empty-state" style="display: none;">
    No harnesses configured.<br />Click + Add Harness to get started.
  </div>

  <button class="add-btn" id="add-btn">+ Add Harness</button>

  <script src="${sidebarJsUri}"></script>
</body>
</html>
